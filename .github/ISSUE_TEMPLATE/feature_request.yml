name: Feature Request
description: Suggest a new feature or improvement
labels: ["type: feat"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - M1 — Global Stack
        - M2 — Project Management
        - M3 — Terminal & Commands
        - M4 — Logs & Observability
        - M5 — Infrastructure Config
        - M6 — Database Management
        - M7 — Settings & Preferences
        - M8 — Sandbox & Sharing
        - New module / Not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who experiences it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
