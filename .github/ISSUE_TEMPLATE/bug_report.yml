name: Bug Report
description: Report a bug in Orcker
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill out the form below to help us reproduce and fix it.

  - type: input
    id: orcker-version
    attributes:
      label: Orcker Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Other)
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows 10
        - Windows 11
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker Engine Version
      placeholder: "e.g. 26.1.4 — run: docker --version"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - M1 — Global Stack
        - M2 — Project Management
        - M3 — Terminal & Commands
        - M4 — Logs & Observability
        - M5 — Infrastructure Config
        - M6 — Database Management
        - M7 — Settings & Preferences
        - M8 — Sandbox & Sharing
        - Not sure / Multiple
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Orcker
        2. Navigate to...
        3. Click...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      render: shell
